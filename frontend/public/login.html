<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCERA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="login-body">
    <div class="login-container">
        <h1>VINCERA</h1>
        <p>Premium Video Conferencing</p>

        <div class="auth-tabs" style="display: flex; gap: 1rem; margin-bottom: 2rem; justify-content: center;">
            <button id="show-login" class="tab-btn active" onclick="toggleAuthMode('login')">Login</button>
            <button id="show-register" class="tab-btn" onclick="toggleAuthMode('register')">Sign Up</button>
        </div>

        <form id="login-form" onsubmit="handleEmailLogin(event)">
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <form id="register-form" onsubmit="handleEmailRegister(event)" style="display: none;">
            <input type="text" id="reg-name" placeholder="Full Name" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div style="margin: 1.5rem 0; color: #8b949e; position: relative;">
            <hr style="border: 0; border-top: 1px solid var(--border-color);">
            <span
                style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-color); padding: 0 10px; font-size: 0.8rem;">OR</span>
        </div>

        <div id="g_id_signin_container" style="display: flex; justify-content: center;"></div>

    </div>

    <script src="/js/auth.js"></script>
    <script>
        function toggleAuthMode(mode) {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const loginBtn = document.getElementById('show-login');
            const regBtn = document.getElementById('show-register');

            if (mode === 'login') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                loginBtn.classList.add('active');
                regBtn.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                loginBtn.classList.remove('active');
                regBtn.classList.add('active');
            }
        }

        // Initialize Google Sign-In
        window.onload = function () {
            fetch('/api/config')
                .then(res => res.json())
                .then(config => {
                    if (config.googleClientId) {
                        google.accounts.id.initialize({
                            client_id: config.googleClientId,
                            callback: handleCredentialResponse
                        });
                        google.accounts.id.renderButton(
                            document.getElementById("g_id_signin_container"),
                            { theme: "outline", size: "large", width: "100%" }
                        );
                    }
                });
        };
    </script>
</body>

</html>
