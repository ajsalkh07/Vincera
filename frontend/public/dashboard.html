<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCERA - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="dashboard-body">
    <nav class="navbar" style="position: fixed; width: 100%; top: 0;">
        <div class="logo">VINCERA</div>
        <div class="user-profile" style="display: flex; align-items: center; gap: 1rem;">
            <span id="userName" style="font-weight: 600;">User</span>
            <button id="logoutBtn" class="btn-secondary" style="width: auto; padding: 0.5rem 1.25rem;">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-card">
            <h2>Start Meeting</h2>
            <p>Host a new premium video session instantly.</p>
            <button id="createMeetingBtn" class="btn-primary">Start Now</button>
        </div>

        <div class="dashboard-card">
            <h2>Join Meeting</h2>
            <p>Enter a meeting code to connect with others.</p>
            <input type="text" id="meetingCodeInput" placeholder="Meeting Code">
            <button id="joinMeetingBtn" class="btn-secondary">Join Meeting</button>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            const user = JSON.parse(localStorage.getItem('userSession'));
            document.getElementById('userName').textContent = user.name;

            document.getElementById('createMeetingBtn').onclick = async () => {
                const response = await fetch('/api/meeting/create', { method: 'POST' });
                const data = await response.json();
                if (data.success) window.location.href = `/room/${data.meetingId}`;
            };

            document.getElementById('joinMeetingBtn').onclick = () => {
                const code = document.getElementById('meetingCodeInput').value.trim();
                if (code) window.location.href = `/room/${code}`;
            };
        });
    </script>
</body>

</html>
