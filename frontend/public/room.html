<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINCERA - Meeting</title>
    <!-- LiveKit SDK from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@livekit/track-processors@0.7.0/dist/index.umd.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/auth.js"></script>
</head>

<body class="room-body">
    <div class="main-room-container">
        <div class="video-grid-container">
            <div class="meeting-header">
                <div class="logo">VINCERA</div>
                <div class="meeting-code-display">
                    Meeting Code: <span id="meetingCode">Loading...</span>
                    <button id="copyMeetingCode" class="copy-btn" title="Copy Code">
                        <svg viewBox="0 0 24 24" class="lucide lucide-copy">
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="video-grid" class="video-grid">
                <!-- Video tiles go here -->
            </div>

            <div class="controls-bar">
                <button id="toggleMic" class="control-btn active" title="Toggle Mic">
                    <svg viewBox="0 0 24 24" class="lucide lucide-mic">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                        <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
                        <line x1="12" x2="12" y1="19" y2="22" />
                    </svg>
                </button>
                <button id="toggleVideo" class="control-btn active" title="Toggle Cam">
                    <svg viewBox="0 0 24 24" class="lucide lucide-video">
                        <path d="m22 8-6 4 6 4V8Z" />
                        <rect width="14" height="12" x="2" y="6" rx="2" ry="2" />
                    </svg>
                </button>
                <button id="toggleHand" class="control-btn" title="Raise Hand">
                    <svg viewBox="0 0 24 24" class="lucide lucide-hand">
                        <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" />
                        <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" />
                        <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" />
                        <path
                            d="M18 8a2 2 0 0 1 2 2v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-1.3-6.6-4.4L2 13.6a2 2 0 0 1 0-2.8v0a2 2 0 0 1 2.8 0l2.2 2.2" />
                    </svg>
                </button>
                <button id="toggleScreen" class="control-btn" title="Share Screen">
                    <svg viewBox="0 0 24 24" class="lucide lucide-monitor">
                        <rect width="20" height="14" x="2" y="3" rx="2" />
                        <line x1="8" x2="16" y1="21" y2="21" />
                        <line x1="12" x2="12" y1="17" y2="21" />
                    </svg>
                </button>
                <button id="leaveMeeting" class="control-btn danger">
                    <svg viewBox="0 0 24 24" class="lucide lucide-log-out">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" x2="9" y1="12" y2="12" />
                    </svg>
                    <span>Leave</span>
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-target="participants">
                    <svg viewBox="0 0 24 24" class="lucide lucide-users">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span>Participants</span>
                </button>
                <button class="tab-btn" data-target="chat">
                    <svg viewBox="0 0 24 24" class="lucide lucide-message-square">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <span>Chat</span>
                </button>
                <button class="tab-btn" data-target="polls">
                    <svg viewBox="0 0 24 24" class="lucide lucide-bar-chart-3">
                        <path d="M3 3v18h18" />
                        <path d="M18 17V9" />
                        <path d="M13 17V5" />
                        <path d="M8 17v-3" />
                    </svg>
                    <span>Polls</span>
                </button>
                <button class="tab-btn" data-target="effects">
                    <svg viewBox="0 0 24 24" class="lucide lucide-sparkles">
                        <path
                            d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.937A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z" />
                        <path d="M20 3v4" />
                        <path d="M22 5h-4" />
                        <path d="M4 17v4" />
                        <path d="M6 19H2" />
                    </svg>
                    <span>Effects</span>
                </button>
            </div>

            <div id="participants" class="tab-content active">
                <div style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
                    <p style="font-size: 0.8rem; margin-bottom: 0.5rem;">Change Display Name</p>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="newNameInput" placeholder="New name..."
                            style="margin-bottom: 0; padding: 0.5rem;">
                        <button id="changeNameBtn" class="btn-primary"
                            style="width: auto; padding: 0.5rem 1rem;">Update</button>
                    </div>
                </div>
                <ul id="participantsList"></ul>
            </div>

            <div id="chat" class="tab-content">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Message everyone...">
                    <button id="sendChat" class="btn-primary" style="width: auto; padding: 0.5rem 1rem;">Send</button>
                </div>
            </div>

            <div id="polls" class="tab-content">
                <div id="activePolls" style="margin-bottom: 1.5rem;"></div>
                <button id="createPollBtn" class="btn-secondary" style="display: none;">Create New Poll</button>
            </div>

            <div id="effects" class="tab-content">
                <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Virtual Backgrounds</h3>
                <div class="effects-grid">
                    <div class="effect-card active" data-effect="none">
                        <div class="effect-preview"
                            style="background: #333; display: flex; align-items: center; justify-content: center;">
                            <svg viewBox="0 0 24 24" class="lucide lucide-ban"
                                style="width: 24px; height: 24px; opacity: 0.5;">
                                <circle cx="12" cy="12" r="10" />
                                <path d="m4.9 4.9 14.2 14.2" />
                            </svg>
                        </div>
                        <span>None</span>
                    </div>
                    <div class="effect-card" data-effect="blur">
                        <div class="effect-preview"
                            style="background: #444; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;">
                            <svg viewBox="0 0 24 24" class="lucide lucide-layers"
                                style="width: 24px; height: 24px; opacity: 0.8;">
                                <path
                                    d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z" />
                                <path d="m22 17.65-9.17 3.91a2 2 0 0 1-1.66 0L2 17.65" />
                                <path d="m22 12.65-9.17 3.91a2 2 0 0 1-1.66 0L2 12.65" />
                            </svg>
                        </div>
                        <span>Blur</span>
                    </div>
                    <div class="effect-card" data-effect="image"
                        data-url="https://images.unsplash.com/photo-1497215842964-222b430dc094?auto=format&fit=crop&w=1200&q=80">
                        <div class="effect-preview"
                            style="background: url('https://images.unsplash.com/photo-1497215842964-222b430dc094?auto=format&fit=crop&w=100&q=80') center/cover;">
                        </div>
                        <span>Office</span>
                    </div>
                    <div class="effect-card" data-effect="image"
                        data-url="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1200&q=80">
                        <div class="effect-preview"
                            style="background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=100&q=80') center/cover;">
                        </div>
                        <span>Skyline</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/room.js"></script>
</body>

</html>
